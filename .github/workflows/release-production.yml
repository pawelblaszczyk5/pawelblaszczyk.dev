name: Release production

on:
  workflow_run:
    workflows: [Verify]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}

jobs:
  deploy:
    name: Deploy production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@24cb9080177205b6e8c946b17badbe402adc938f # pin@v3

      - name: Setup
        uses: ./.github/composite-actions/setup

      - name: Install fly.io
        uses: superfly/flyctl-actions/setup-flyctl@5e0688e3d0586e2cad2288e6c49c3e9bedac39e5 # pin@master

      - name: Deploy production environment
        run: flyctl deploy --remote-only --app misty-water-595
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_PRODUCTION_API_TOKEN  }}
